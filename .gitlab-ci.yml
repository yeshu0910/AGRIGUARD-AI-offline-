stages:
  - lint
  - format
  - type_check
  - dead_code
  - test
  - coverage
  - security
  - compliance

image: python:3.11

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"

cache:
  paths:
    - .cache/pip

before_script:
  - python -m pip install --upgrade pip setuptools wheel

# =========================
# LINT
# =========================
lint:
  stage: lint
  interruptible: true
  script:
    - pip install ruff
    - ruff check .

# =========================
# FORMAT
# =========================
format:
  stage: format
  interruptible: true
  script:
    - pip install ruff
    - ruff format --check .

# =========================
# TYPE CHECK
# =========================
type_check:
  stage: type_check
  interruptible: true
  script:
    - pip install mypy
    - mypy .
  allow_failure: true

# =========================
# DEAD CODE
# =========================
dead_code:
  stage: dead_code
  interruptible: true
  script:
    - pip install vulture
    - vulture .
  allow_failure: true

# =========================
# TESTS
# =========================
test:
  stage: test
  interruptible: true
  script:
    - pip install -e .
    - pip install pytest pytest-cov
    - pytest
  allow_failure: true

# =========================
# COVERAGE
# =========================
coverage:
  stage: coverage
  interruptible: true
  script:
    - pip install -e .
    - pip install pytest pytest-cov
    - pytest --cov=. --cov-report=xml
  artifacts:
    when: always
    paths:
      - coverage.xml
  allow_failure: true

# =========================
# SECURITY
# =========================
security:
  stage: security
  interruptible: true
  script:
    - pip install bandit pip-audit
    - bandit -r .
    - pip-audit
  allow_failure: true

# =========================
# COMPLIANCE
# =========================
compliance:
  stage: compliance
  interruptible: true
  script:
    - test -f README.md
    - test -f LICENSE || true
    - test -f SECURITY.md || true