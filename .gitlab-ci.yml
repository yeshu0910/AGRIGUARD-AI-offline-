# AgriGuard AI GitLab CI Pipeline
# Validates offline-first crop health, image analysis, and AI recommendation code.

stages:
  - format
  - lint
  - type_check
  - dead_code
  - test
  - coverage
  - security
  - compliance

image: python:3.12

before_script:
  - python -m pip install --upgrade pip setuptools wheel

# =========================
# FORMAT
# =========================
format:
  stage: format
  script:
    - pip install ruff
    - ruff format --check .

# =========================
# LINT
# =========================
lint:
  stage: lint
  script:
    - pip install ruff
    - ruff check .

# =========================
# TYPE CHECK
# =========================
type_check:
  stage: type_check
  script:
    - pip install mypy
    - mypy . || true

# =========================
# DEAD CODE
# =========================
dead_code:
  stage: dead_code
  script:
    - pip install vulture
    - vulture . || true
  allow_failure: true

# =========================
# TESTS
# =========================
test:
  stage: test
  script:
    - pip install -e .
    - pip install pytest pytest-cov
    - pytest || true
  allow_failure: true

# =========================
# COVERAGE
# =========================
coverage:
  stage: coverage
  script:
    - pip install -e .
    - pip install pytest pytest-cov
    - pytest --cov=. --cov-report=xml || true
  artifacts:
    paths:
      - coverage.xml
  allow_failure: true

# =========================
# SECURITY
# =========================
security:
  stage: security
  script:
    - pip install bandit pip-audit
    - bandit -r . || true
    - pip-audit || true
  allow_failure: true

# =========================
# COMPLIANCE
# =========================
compliance:
  stage: compliance
  script:
    - test -f README.md
    - test -f LICENSE || true
    - test -f SECURITY.md || true
