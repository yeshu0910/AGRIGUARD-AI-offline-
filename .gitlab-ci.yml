# AgriGuard AI GitLab CI Pipeline
# Validates offline-first crop health, image analysis, and AI recommendation code.

stages:
  - lint
  - security
  - type-check
  - test
  - build

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  PIP_DISABLE_PIP_VERSION_CHECK: "1"

cache:
  paths:
    - .cache/pip

lint:
  stage: lint
  image: python:3.12-slim
  before_script:
    - python -m pip install --upgrade pip
    - pip install -r requirements-dev.txt
  script:
    - ruff check .
  allow_failure: false
  artifacts:
    when: always
    paths:
      - .ruff_cache/

bandit:
  stage: security
  image: python:3.12-slim
  before_script:
    - python -m pip install --upgrade pip
    - pip install bandit
  script:
    - |
      if find backend -name "*.py" 2>/dev/null | grep -q .; then
        bandit -qr backend/ -f json -o bandit-report.json
      else
        echo '{"results":[],"errors":[]}' > bandit-report.json
        echo "No backend Python files found for Bandit yet."
      fi
  artifacts:
    when: always
    paths:
      - bandit-report.json

gitleaks:
  stage: security
  image:
    name: zricethezav/gitleaks:latest
    entrypoint: [""]
  script:
    - gitleaks detect --source . --config .gitleaks.toml --redact --report-format json --report-path gitleaks-report.json
  allow_failure: false
  artifacts:
    when: always
    paths:
      - gitleaks-report.json

type-check:
  stage: type-check
  image: python:3.12-slim
  before_script:
    - python -m pip install --upgrade pip
    - pip install -r requirements-dev.txt
  script:
    - |
      if find backend -name "*.py" 2>/dev/null | grep -q .; then
        mypy backend/
      else
        echo "No backend Python files found for Mypy yet."
      fi
  allow_failure: false

test:
  stage: test
  image: python:3.12-slim
  before_script:
    - python -m pip install --upgrade pip
    - pip install -r requirements-dev.txt
  script:
    - |
      if find backend/tests tests/integration -name "test_*.py" -o -name "*_test.py" 2>/dev/null | grep -q .; then
        pytest backend/tests/ tests/integration/ -v --cov=backend --cov-report=term --cov-report=xml
      else
        echo "No pytest files found yet for backend/tests or tests/integration."
        echo '<coverage version="1"><packages></packages></coverage>' > coverage.xml
      fi
  coverage: '/TOTAL\s+\d+\s+\d+\s+(\d+%)/'
  allow_failure: false
  artifacts:
    when: always
    paths:
      - coverage.xml
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml

changelog:
  stage: build
  image:
    name: orhunp/git-cliff:latest
    entrypoint: [""]
  script:
    - git-cliff --config cliff.toml --output CHANGELOG.generated.md
  artifacts:
    when: always
    paths:
      - CHANGELOG.generated.md

build:
  stage: build
  image: docker:24
  services:
    - name: docker:24-dind
  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
  before_script:
    - docker info
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
  script:
    - docker build -t "$CI_REGISTRY_IMAGE:$CI_COMMIT_SHA" -t "$CI_REGISTRY_IMAGE:latest" .
    - docker push "$CI_REGISTRY_IMAGE:$CI_COMMIT_SHA"
    - docker push "$CI_REGISTRY_IMAGE:latest"
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
