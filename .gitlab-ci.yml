# AgriGuard AI GitLab CI Pipeline
# Validates offline-first crop health, image analysis, and AI recommendation code.

stages:
  - format
  - lint
  - type_check
  - dead_code
  - test
  - coverage
  - security
  - compliance

image: python:3.12

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"

cache:
  paths:
    - .cache/pip

before_script:
  - python -m pip install --upgrade pip setuptools wheel

# =========================
# FORMAT
# =========================
format:
  stage: format
  interruptible: true
  script:
    - pip install -e .[dev]
    - ruff format --check AgriGuard/backend/

# =========================
# LINT
# =========================
lint:
  stage: lint
  interruptible: true
  script:
    - pip install -e .[dev]
    - ruff check AgriGuard/backend/

# =========================
# TYPE CHECK
# =========================
type_check:
  stage: type_check
  interruptible: true
  script:
    - pip install -e .[dev]
    - mypy AgriGuard/backend/ --ignore-missing-imports || true

# =========================
# DEAD CODE
# =========================
dead_code:
  stage: dead_code
  interruptible: true
  script:
    - pip install -e .[dev]
    - vulture AgriGuard/backend/ --min-confidence 80
  allow_failure: true

# =========================
# TESTS
# =========================
test:
  stage: test
  interruptible: true
  before_script:
    - apt-get update && apt-get install -y --no-install-recommends libgl1 libglib2.0-0 && rm -rf /var/lib/apt/lists/*
    - python -m pip install --upgrade pip setuptools wheel
  script:
    - pip install -e .
    - pip install pytest pytest-cov httpx
    - pytest --tb=short AgriGuard/backend/tests/
  allow_failure: true

# =========================
# COVERAGE
# =========================
coverage:
  stage: coverage
  interruptible: true
  before_script:
    - apt-get update && apt-get install -y --no-install-recommends libgl1 libglib2.0-0 && rm -rf /var/lib/apt/lists/*
    - python -m pip install --upgrade pip setuptools wheel
  script:
    - pip install -e .[dev]
    - pytest --cov=AgriGuard.backend --cov-report=xml
  artifacts:
    paths:
      - coverage.xml
  allow_failure: true

# =========================
# SECURITY
# =========================
security:
  stage: security
  interruptible: true
  script:
    - pip install -e .[dev]
    - bandit -r AgriGuard/backend/ -q --exclude AgriGuard/backend/tests
    - semgrep --config pyproject.toml --error --quiet || true
  allow_failure: true

# =========================
# COMPLIANCE
# =========================
compliance:
  stage: compliance
  interruptible: true
  script:
    - test -f README.md
    - test -f LICENSE
    - test -f SECURITY.md