# AgriGuard AI GitLab CI Pipeline
# Validates offline-first crop health, image analysis, and AI recommendation code.

stages:
  - format
  - lint
  - type_check
  - security
  - dependency_audit
  - test
  - coverage
  - build
  - release

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  PYTHONUNBUFFERED: "1"
  PRE_COMMIT_HOME: "$CI_PROJECT_DIR/.cache/pre-commit"

cache:
  key: "$CI_JOB_NAME"
  paths:
    - .cache/pip
    - .cache/pre-commit
    - .ruff_cache/
    - .mypy_cache/

workflow:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
    - if: '$CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/'

.ruff-base: &ruff-base
  image: python:3.12-slim
  before_script:
    - python -m pip install --upgrade pip
    - pip install -r requirements-dev.txt
  allow_failure: false

.ruff-cache: &ruff-cache
  cache:
    key: "ruff-cache"
    paths:
      - .ruff_cache/

format-ruff:
  stage: format
  image: python:3.12-slim
  before_script:
    - python -m pip install --upgrade pip
    - pip install ruff
  script:
    - ruff format --check .
  allow_failure: false
  cache:
    key: "ruff-cache"
    paths:
      - .ruff_cache/

lint-ruff:
  stage: lint
  <<: *ruff-base
  script:
    - ruff check .
  cache:
    key: "ruff-cache"
    paths:
      - .ruff_cache/

lint-flake8:
  stage: lint
  <<: *ruff-base
  script:
    - flake8 backend/ AgriGuard/backend/
  cache:
    key: "ruff-cache"
    paths:
      - .ruff_cache/

lint-pylint:
  stage: lint
  <<: *ruff-base
  script:
    - pylint --rcfile=.pylintrc backend/ AgriGuard/backend/

lint-vulture:
  stage: lint
  <<: *ruff-base
  script:
    - vulture backend/ AgriGuard/backend/ --min-confidence 80

type-check:
  stage: type_check
  <<: *ruff-base
  script:
    - mypy backend/ AgriGuard/backend/

security-bandit:
  stage: security
  <<: *ruff-base
  script:
    - bandit -qr backend/ AgriGuard/backend/ -f json -o bandit-report.json
  artifacts:
    when: always
    paths:
      - bandit-report.json

security-semgrep:
  stage: security
  image: python:3.12-slim
  before_script:
    - python -m pip install --upgrade pip
    - pip install semgrep
  script:
    - semgrep --config=auto --error --json -o semgrep-report.json backend/ AgriGuard/backend/ || true
  artifacts:
    when: always
    paths:
      - semgrep-report.json

security-gitleaks:
  stage: security
  image:
    name: zricethezav/gitleaks:latest
    entrypoint: [""]
  script:
    - gitleaks detect --source . --config .gitleaks.toml --redact --report-format json --report-path gitleaks-report.json
  allow_failure: false
  artifacts:
    when: always
    paths:
      - gitleaks-report.json

dependency-audit:
  stage: dependency_audit
  <<: *ruff-base
  script:
    - pip-audit --strict --desc --requirement requirements.txt --ignore-vuln CVE-2025-69872
  allow_failure: false

pyupgrade-check:
  stage: lint
  <<: *ruff-base
  script:
    - pyupgrade --py310-plus $(find backend/ AgriGuard/backend/ -name '*.py' -type f) --check

test:
  stage: test
  <<: *ruff-base
  script:
    - python -m pytest AgriGuard/backend/tests/ tests/ -v --junitxml=test-report.xml --cov=AgriGuard/backend --cov-report=term --cov-report=xml:coverage.xml
  coverage: '/TOTAL\s+\d+\s+\d+\s+(\d+%)/'
  artifacts:
    when: always
    reports:
      junit: test-report.xml
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml
    paths:
      - coverage.xml
      - test-report.xml
    expire_in: 30 days

coverage:
  stage: coverage
  <<: *ruff-base
  script:
    - python -m pytest AgriGuard/backend/tests/ tests/ -v --cov=AgriGuard/backend --cov-report=term --cov-report=html:coverage_html --cov-fail-under=80
  coverage: '/TOTAL\s+\d+\s+\d+\s+(\d+%)/'
  artifacts:
    when: always
    paths:
      - coverage_html/
    expire_in: 30 days

build-docker:
  stage: build
  image: docker:24
  services:
    - name: docker:24-dind
  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
  before_script:
    - docker info
    - echo "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" --password-stdin "$CI_REGISTRY"
  script:
    - docker build -t "$CI_REGISTRY_IMAGE:$CI_COMMIT_SHA" -t "$CI_REGISTRY_IMAGE:latest" .
    - docker push "$CI_REGISTRY_IMAGE:$CI_COMMIT_SHA"
    - docker push "$CI_REGISTRY_IMAGE:latest"
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'

changelog:
  stage: build
  image:
    name: orhunp/git-cliff:latest
    entrypoint: [""]
  script:
    - git-cliff --config cliff.toml --output CHANGELOG.generated.md
  artifacts:
    when: always
    paths:
      - CHANGELOG.generated.md
    expire_in: 30 days

release:
  stage: release
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  script:
    - release-cli create --name "AgriGuard AI $CI_COMMIT_TAG" --tag-name "$CI_COMMIT_TAG" --description "Release $CI_COMMIT_TAG"
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/'
