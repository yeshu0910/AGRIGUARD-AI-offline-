# Git-Cliff configuration for AgriGuard AI.

[changelog]
header = """
# Changelog

All notable changes to AgriGuard AI are documented here. This project uses
Conventional Commits to track improvements for farmers, agricultural experts,
AI recommendations, crop health workflows, emergency SOS, weather insights, and
offline image analysis.

"""
body = """
{% if version %}\
## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
## [Unreleased]
{% endif %}\

{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | upper_first }}
{% for commit in commits %}
- {{ commit.message | upper_first }}{% if commit.remote.pr_number %} (!{{ commit.remote.pr_number }}){% endif %}
{% endfor %}
{% endfor %}\n
"""
trim = true
footer = """
Generated by Git-Cliff for the AgriGuard AI release workflow.
"""

[git]
conventional_commits = true
filter_unconventional = false
split_commits = false
tag_pattern = "v[0-9]*"
sort_commits = "oldest"

commit_parsers = [
  { message = "^feat", group = "Features" },
  { message = "^fix", group = "Bug Fixes" },
  { message = "^docs", group = "Documentation" },
  { message = "^test", group = "Testing" },
  { message = "^security", group = "Security" },
  { message = "^refactor", group = "Refactoring" },
  { message = "^perf", group = "Performance" },
  { message = "^ci", group = "Continuous Integration" },
  { message = "^build", group = "Build System" },
  { message = "^chore", group = "Maintenance" },
  { message = "^revert", group = "Reverts" },
]

protect_breaking_commits = true
filter_commits = false

